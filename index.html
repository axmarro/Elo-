<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi chiquita ❤️</title>

<style>

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
text-align:center;
overflow-x:hidden;
background:black;
}

/* estrellas /

.star{
position:absolute;
color:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

/ carta /

.carta{
position:relative;
background:rgba(0,0,0,0.65);
padding:40px;
border-radius:20px;
max-width:600px;
box-shadow:0 0 40px rgba(255,0,100,0.5);
z-index:5;
}

img{
width:230px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(255,255,255,0.6);
}

/ botones /

button{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
background:#ff4e7a;
color:white;
}

/ corazones flotando /

.heart{
position:absolute;
bottom:-20px;
animation:float 7s linear infinite;
}

@keyframes float{
0%{transform:translateY(0); opacity:1;}
100%{transform:translateY(-110vh); opacity:0;}
}

/ contraseña /

#passwordModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

#passwordModalContent{
background:#fff0f5;
padding:50px 40px;
border-radius:20px;
text-align:center;
}

#passwordInput{
padding:12px;
width:80%;
margin-bottom:20px;
border-radius:10px;
border:2px solid #ff6b6b;
}

#submitPassword{
padding:12px 25px;
background:#ff6b6b;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

#errorMsg{
color:red;
display:none;
}

/ contenido oculto /

#content{
display:none;
}

/ slideshow /

#slideshowModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}

#slideshowContent{
position:relative;
max-width:500px;
}

/ fotos /

#slideshowContent img{
width:100%;
border-radius:15px;
opacity:0;
position:absolute;
transition:opacity 1s;
box-shadow:0 0 30px #ff4e7a;
animation:glow 3s infinite;
}

@keyframes glow{
0%{box-shadow:0 0 20px #ff4e7a;}
50%{box-shadow:0 0 60px #ff9bb3;}
100%{box-shadow:0 0 20px #ff4e7a;}
}

#slideshowContent img.active{
opacity:1;
position:relative;
}

/ video cinematic /

#slideshowContent video{
width:100%;
border-radius:15px;
opacity:0;
position:absolute;
transform:scale(0.9);
transition:opacity 1.2s, transform 1.2s;
box-shadow:0 0 40px #ff4e7a;
}

#slideshowContent video.active{
opacity:1;
position:relative;
transform:scale(1);
}

/ cerrar /

.closeBtn{
position:absolute;
top:-30px;
right:-10px;
font-size:30px;
cursor:pointer;
}

/ corazones del slideshow /

.slideHeart{
position:absolute;
bottom:-20px;
font-size:22px;
animation:slideHeartFloat 6s linear infinite;
}

@keyframes slideHeartFloat{
0%{transform:translateY(0);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

</style>
</head>

<body>

<!-- contraseña -->

<div id="passwordModal">
<div id="passwordModalContent">
<h2>Introduce la contraseña</h2>
<input type="password" id="passwordInput">
<br>
<button id="submitPassword">Entrar</button>
<p id="errorMsg">Contraseña incorrecta</p>
</div>
</div>

<!-- contenido -->

<div id="content">
<div class="carta">

<img src="nosotros.jpg">

<h1>Para mi chiquita ❤️</h1>

<p>Desde que llegaste a mi vida todo cambió para mejor.</p>
<p>No importa dónde esté, mientras esté contigo todo está bien.</p>
<p>Te amo más de lo que las palabras pueden explicar.</p>

<h3>⏳ Tiempo que llevamos juntos:</h3>
<p id="contador"></p>

<button id="openSlideshow">Aprieta aquí ❤️</button>

</div>
</div>

<!-- slideshow -->

<div id="slideshowModal">
<div id="slideshowContent">
<span class="closeBtn">×</span>
</div>
</div>

<script>

/ contraseña /

const password="miamor123";
const modal=document.getElementById("passwordModal");
const content=document.getElementById("content");

document.getElementById("submitPassword").onclick=()=>{
let input=document.getElementById("passwordInput").value;

if(input===password){
modal.style.display="none";
content.style.display="block";
}else{
document.getElementById("errorMsg").style.display="block";
}
};

/ contador /

const inicio=new Date("2025-08-23");

function actualizarTiempo(){
const ahora=new Date();
const diff=ahora-inicio;

const dias=Math.floor(diff/(1000606024));
const horas=Math.floor((diff/(10006060))%24);
const minutos=Math.floor((diff/(100060))%60);

document.getElementById("contador").innerHTML=
dias+" días "+horas+" horas "+minutos+" minutos ❤️";
}

actualizarTiempo();
setInterval(actualizarTiempo,1000);

/ estrellas */

for(let i=0;i<120;i++){
let star=document.createElement("div");
star.className="star";
star.innerHTML="✦";
star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()100+"vh";
document.body.appendChild(star);
}

/ corazones */

setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()100+"vw";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),7000);
},400);

/ slideshow /

const slidesData=[
{type:"img",src:"foto1.JPG"},
{type:"img",src:"foto2.JPG"},
{type:"img",src:"foto3.JPG"},
{type:"video",src:"video.mp4"}
];

const slideshowContent=document.getElementById("slideshowContent");
const slideshowModal=document.getElementById("slideshowModal");
const openBtn=document.getElementById("openSlideshow");
const closeBtn=document.querySelector(".closeBtn");

let index=0;
let interval;

/ crear slides /

slidesData.forEach((item,i)=>{

let element;

if(item.type==="img"){
element=document.createElement("img");
element.src=item.src;
}

if(item.type==="video"){
element=document.createElement("video");
element.src=item.src;
element.controls=true;
}

if(i===0){
element.classList.add("active");
}

slideshowContent.appendChild(element);

});

const slides=document.querySelectorAll("#slideshowContent img, #slideshowContent video");

/ corazones slideshow */

let heartInterval;

function startSlideHearts(){
heartInterval=setInterval(()=>{
let heart=document.createElement("div");
heart.className="slideHeart";
heart.innerHTML="💖";
heart.style.left=Math.random()100+"vw";
slideshowModal.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
},300);
}

function stopSlideHearts(){
clearInterval(heartInterval);
}

/ abrir slideshow /

openBtn.onclick=()=>{

slideshowModal.style.display="flex";

startSlideHearts();

index=0;

slides.forEach(s=>s.classList.remove("active"));
slides[0].classList.add("active");

interval=setInterval(()=>{

slides[index].classList.remove("active");

index++;

if(index>=slides.length){

clearInterval(interval);

slides[index-1].classList.add("active");

let vid=slides[index-1];

if(vid.tagName==="VIDEO"){
vid.play();
}

return;

}

slides[index].classList.add("active");

},2500);

};

/ cerrar */

closeBtn.onclick=()=>{

slideshowModal.style.display="none";

stopSlideHearts();

clearInterval(interval);

slides.forEach(s=>{
if(s.tagName==="VIDEO"){
s.pause();
s.currentTime=0;
}
});

};

</script>

</body>
</
